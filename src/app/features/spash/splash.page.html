<div class="relative h-screen w-full overflow-hidden bg-black text-white">
  <div class="absolute inset-0">
    <div
      class="absolute top-[-100px] left-[-100px] w-[300px] h-[300px] bg-brand-600 blur-[120px] opacity-40"
    ></div>
    <div
      class="absolute bottom-[-120px] right-[-120px] w-[350px] h-[350px] bg-brand-400 blur-[140px] opacity-30"
    ></div>
  </div>

  <!-- CONTENT -->
  <div class="relative z-10 h-full flex flex-col items-center justify-center px-6">
    <!-- GLASS CARD -->
    <div
      class="backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl px-8 py-10 flex flex-col items-center gap-6 shadow-2xl w-full max-w-sm"
    >
      <!-- LOGO -->
      <div
        class="w-20 h-20 rounded-2xl bg-gradient-to-br from-purple-500 via-blue-500 to-cyan-400 flex items-center justify-center shadow-lg animate-pulse text-xl"
      >
        📝
      </div>

      <!-- TITLE -->
      <div class="text-center">
        <h1 class="text-2xl font-bold tracking-tight">My Notes</h1>
        <p class="text-xs text-gray-400 mt-1">v1.0.0 • personal workspace</p>
      </div>

      <!-- SUBTITLE -->
      <p class="text-sm text-gray-300 text-center">Organizing your ideas{{ dots }}</p>

      <!-- MINI LOADER -->
      <div class="flex gap-1 mt-1">
        <span class="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></span>
        <span
          class="w-1.5 h-1.5 bg-white/70 rounded-full animate-pulse [animation-delay:150ms]"
        ></span>
        <span
          class="w-1.5 h-1.5 bg-white/40 rounded-full animate-pulse [animation-delay:300ms]"
        ></span>
      </div>
    </div>

    <!-- FOOTER INFO -->
    <div class="absolute bottom-10 text-center text-[10px] text-gray-500 space-y-1">
      <p>Encrypted local-first experience</p>
      <p>Optimized for mobile & web</p>
    </div>
  </div>
</div>
