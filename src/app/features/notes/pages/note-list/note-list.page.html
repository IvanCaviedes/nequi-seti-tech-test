<ion-content fullscreen="true" class="ion-no-padding text-white">
  <div class="flex-1 flex flex-col relative bg-red">
    <!-- TOPBAR -->
    <app-topbar-notes />

    <!-- GRID -->
    <div class="flex-1 px-5 md:px-8 pb-8 grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- ========================= -->
      <!-- CENTER -->
      <!-- ========================= -->
      <div class="lg:col-span-2 flex flex-col gap-6">
        <!-- STATS -->
        <ng-container *ngIf="enableNewUI$ | async; else legacyUIStats">
          <!-- 🆕 UI NUEVA -->
          <div class="p-5 rounded-2xl bg-indigo-500/10 border border-indigo-400/20">
            <h2 class="text-white font-semibold">✨ New Notes UI Enabled</h2>
            <p class="text-white/60 text-xs">Feature flag ACTIVE via Remote Config</p>
          </div>

          <app-stats-v2-notes />
        </ng-container>
        <ng-template #legacyUIStats>
          <app-stats-notes />
        </ng-template>

        <!-- TASKS -->
        <div class="flex flex-col gap-6">
          <!-- SECTION HEADER -->
          <div class="flex items-end justify-between">
            <div>
              <h2 class="text-2xl font-semibold tracking-tight">Your Notes</h2>

              <p class="text-sm text-white/50 mt-1">
                Capture ideas, tasks and everything in between
              </p>
            </div>
          </div>

          <!-- DIVIDER -->
          <div class="h-px bg-white/10"></div>

          <!-- CONTENT WRAPPER -->
          <div class="flex flex-col gap-3">
            <app-note-filters />
            <ng-container *ngIf="enableNewUI$ | async; else legacyUI">
              <!-- 🆕 UI NUEVA -->
              <div class="p-5 rounded-2xl bg-indigo-500/10 border border-indigo-400/20">
                <h2 class="text-white font-semibold">✨ New Notes UI Enabled</h2>
                <p class="text-white/60 text-xs">Feature flag ACTIVE via Remote Config</p>
              </div>

              <app-note-list-v2 [notes]="(notes$ | async) || []"></app-note-list-v2>
            </ng-container>

            <ng-template #legacyUI>
              <app-note-list [notes]="(notes$ | async) || []" />
            </ng-template>
          </div>
        </div>
      </div>

      <!-- ========================= -->
      <!-- RIGHT PANEL -->
      <!-- ========================= -->
      <div class="flex flex-col gap-6">
        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-5">
          <div class="font-semibold mb-3">Calendar</div>

          <div class="grid grid-cols-7 text-center text-xs text-white/50 gap-2">
            <div>Mo</div>
            <div>Tu</div>
            <div>We</div>
            <div>Th</div>
            <div>Fr</div>
            <div>Sa</div>
            <div>Su</div>
          </div>

          <div class="grid grid-cols-7 gap-2 mt-3 text-center text-sm">
            <div class="p-2 rounded-lg bg-white/10">14</div>
            <div>15</div>
            <div>16</div>
            <div>17</div>
            <div>18</div>
            <div>19</div>
            <div>20</div>
          </div>
        </div>

        <app-auth-logout />
      </div>
    </div>
  </div>
</ion-content>
