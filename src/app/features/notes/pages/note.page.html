<ion-content fullscreen="true" class="ion-no-padding text-white">
  <div class="flex-1 flex flex-col relative bg-red">
    <!-- TOPBAR -->
    <app-topbar-notes />

    <!-- GRID -->
    <div class="flex-1 px-5 md:px-8 pb-8 grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- ========================= -->
      <!-- CENTER -->
      <!-- ========================= -->
      <div class="lg:col-span-2 flex flex-col gap-6">
        <!-- STATS -->
        <app-stats-notes />
        <!-- TASKS -->
        <div class="flex flex-col gap-6">
          <!-- SECTION HEADER -->
          <div class="flex items-end justify-between">
            <div>
              <h2 class="text-2xl font-semibold tracking-tight">Your Notes</h2>

              <p class="text-sm text-white/50 mt-1">
                Capture ideas, tasks and everything in between
              </p>
            </div>
          </div>

          <!-- DIVIDER -->
          <div class="h-px bg-white/10"></div>

          <!-- CONTENT WRAPPER -->
          <div class="flex flex-col gap-3">
            <app-note-filters *ngIf="(notes$ | async)!.length > 0" />
            <app-note-list [notes]="(notes$ | async) || []" />
          </div>
        </div>
      </div>

      <!-- ========================= -->
      <!-- RIGHT PANEL -->
      <!-- ========================= -->
      <div class="flex flex-col gap-6">
        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-5">
          <div class="font-semibold mb-2">Insights</div>
          <p class="text-xs text-white/50">Productivity peaks in mornings</p>

          <div class="h-2 bg-white/10 rounded-full mt-3 overflow-hidden">
            <div class="h-full w-[70%] bg-gradient-to-r from-purple-500 to-cyan-500"></div>
          </div>
        </div>

        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-5">
          <div class="font-semibold mb-3">Calendar</div>

          <div class="grid grid-cols-7 text-center text-xs text-white/50 gap-2">
            <div>Mo</div>
            <div>Tu</div>
            <div>We</div>
            <div>Th</div>
            <div>Fr</div>
            <div>Sa</div>
            <div>Su</div>
          </div>

          <div class="grid grid-cols-7 gap-2 mt-3 text-center text-sm">
            <div class="p-2 rounded-lg bg-white/10">14</div>
            <div>15</div>
            <div>16</div>
            <div>17</div>
            <div>18</div>
            <div>19</div>
            <div>20</div>
          </div>
        </div>

        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-5">
          <div class="font-semibold mb-3">Quick Actions</div>

          <div class="flex flex-col gap-2 text-sm text-white/70">
            <div>➕ Create task</div>
            <div>⚡ Focus mode</div>
            <div>📊 Analytics</div>
          </div>
        </div>

        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-5">
          <div class="font-semibold mb-3">Activity</div>

          <div class="flex flex-col gap-3 text-xs text-white/50">
            <div>• Task created</div>
            <div>• Focus mode enabled</div>
            <div>• Project updated</div>
          </div>
        </div>

        <app-auth-logout />
      </div>
    </div>
  </div>
</ion-content>
