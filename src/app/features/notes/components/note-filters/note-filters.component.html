<div
  class="flex flex-col gap-4 p-5 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-xl"
  *ngIf="filters$ | async as filters"
>
  <!-- HEADER -->
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-sm font-semibold text-white">Filters</h2>
      <p class="text-xs text-white/40">Refine your notes</p>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="relative">
    <ion-icon
      name="search-outline"
      class="absolute left-3 top-1/2 -translate-y-1/2 text-white/40 text-sm"
    ></ion-icon>

    <input
      placeholder="Search notes..."
      class="w-full pl-9 pr-3 py-2 rounded-xl bg-white/5 border border-white/10 text-sm text-white outline-none focus:border-white/30 focus:bg-white/10 transition"
      (input)="facade.setSearch($event.target.value)"
    />
  </div>

  <!-- STATUS FILTERS -->
  <div class="grid grid-cols-4 gap-2">
    <!-- ALL -->
    <button
      (click)="facade.setStatus('all')"
      class="px-3 py-2 rounded-xl text-xs border transition"
      [ngClass]="
        filters.status === 'all'
          ? 'bg-green-500/20 border-green-400/30 text-green-300'
          : 'bg-white/5 border-white/10 text-white/60 hover:bg-white/10'
      "
    >
      All
    </button>

    <!-- ACTIVE -->
    <button
      (click)="facade.setStatus('active')"
      class="px-3 py-2 rounded-xl text-xs border transition"
      [ngClass]="
        filters.status === 'active'
          ? 'bg-green-500/20 border-green-400/30 text-green-300'
          : 'bg-white/5 border-white/10 text-white/60 hover:bg-white/10'
      "
    >
      Active
    </button>

    <!-- COMPLETED -->
    <button
      (click)="facade.setStatus('completed')"
      class="px-3 py-2 rounded-xl text-xs border transition"
      [ngClass]="
        filters.status === 'completed'
          ? 'bg-green-500/20 border-green-400/30 text-green-300'
          : 'bg-white/5 border-white/10 text-white/60 hover:bg-white/10'
      "
    >
      Completed
    </button>

    <!-- DELETED -->
    <button
      (click)="facade.setStatus('deleted')"
      class="px-3 py-2 rounded-xl text-xs border transition"
      [ngClass]="
        filters.status === 'deleted'
          ? 'bg-red-500/20 border-red-400/30 text-red-300'
          : 'bg-white/5 border-white/10 text-white/60 hover:bg-white/10'
      "
    >
      Deleted
    </button>
  </div>

  <!-- QUICK TOGGLES -->
  <div class="flex items-center gap-2">
    <!-- FAVORITES -->
    <button
      (click)="facade.toggleFavorites()"
      class="flex-1 flex items-center justify-center gap-2 px-3 py-2 rounded-xl border transition"
      [ngClass]="
        filters.isFavorite
          ? 'bg-yellow-500/20 border-yellow-400/30 text-yellow-300'
          : 'bg-white/5 border-white/10 text-white/60 hover:bg-white/10'
      "
    >
      <ion-icon name="star-outline" class="text-sm"></ion-icon>
      Favorites
    </button>

    <!-- TAGS (modo toggle global) -->
    <button
      *ngFor="let tag of categories$ | async"
      (click)="facade.toggleTag(tag.id)"
      class="flex-1 flex items-center justify-center gap-2 px-3 py-2 rounded-xl border transition"
      [ngClass]="
        filters.categoryIds.includes(tag.id)
          ? 'bg-indigo-500/20 border-indigo-400/30 text-indigo-300'
          : 'bg-white/5 border-white/10 text-white/60 hover:bg-white/10'
      "
    >
      <ion-icon name="pricetags-outline" class="text-sm"></ion-icon>
      {{ tag.name }}
    </button>
  </div>
</div>
