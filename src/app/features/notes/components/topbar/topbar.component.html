<div class="p-5 md:p-8">
  <div
    class="flex items-center bg-white/5 backdrop-blur-2xl border border-white/10 rounded-2xl px-5 py-4"
  >
    <!-- LEFT -->
    <div class="flex items-center" [ngClass]="isBack ? 'w-1/4' : 'w-auto'">
      <button
        *ngIf="isBack"
        (click)="goBack()"
        class="w-9 h-9 flex items-center justify-center rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition"
      >
        <ion-icon name="chevron-back-outline" class="text-white text-lg"></ion-icon>
      </button>
    </div>

    <!-- CENTER -->
    <div
      class="flex-1 flex flex-col"
      [ngClass]="isBack ? 'items-center text-center' : 'items-start text-left'"
    >
      <div
        class="text-sm text-white/60 transition-all duration-300"
        [ngClass]="
          animating ? 'opacity-0 translate-y-1 blur-sm' : 'opacity-100 translate-y-0 blur-0'
        "
      >
        {{ text$ | async }}
      </div>

      <div class="text-xl font-semibold">
        {{ title }}
      </div>
    </div>

    <!-- RIGHT -->
    <div class="flex items-center justify-end" [ngClass]="isBack ? 'w-1/4' : 'w-auto'">
      <button
        *ngIf="!isBack"
        class="px-4 py-2 rounded-xl bg-gradient-to-r from-purple-500 to-cyan-500 text-black font-semibold hover:scale-[1.03] transition"
        (click)="goToCreate()"
      >
        + New Task
      </button>
    </div>
  </div>
</div>
