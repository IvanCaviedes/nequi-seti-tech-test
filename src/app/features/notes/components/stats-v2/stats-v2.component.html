<ng-container *ngIf="stats$ | async as stats">
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
    <!-- TASKS -->
    <div
      class="relative group overflow-hidden rounded-2xl border border-white/10 bg-white/5 backdrop-blur-xl p-4 flex items-center gap-4 hover:bg-white/10 transition"
    >
      <div class="absolute left-0 top-0 h-full w-1 bg-indigo-500"></div>

      <div
        class="w-11 h-11 rounded-xl bg-indigo-500/10 flex items-center justify-center group-hover:scale-110 transition"
      >
        <ion-icon name="list-outline" class="text-xl text-indigo-300"></ion-icon>
      </div>

      <div class="flex flex-col">
        <span class="text-xs text-white/50">Tasks</span>
        <span class="text-xl font-bold text-white">{{ stats.total }}</span>
      </div>
    </div>

    <!-- DONE -->
    <div
      class="relative group overflow-hidden rounded-2xl border border-white/10 bg-white/5 backdrop-blur-xl p-4 flex items-center gap-4 hover:bg-white/10 transition"
    >
      <div class="absolute left-0 top-0 h-full w-1 bg-green-500"></div>

      <div
        class="w-11 h-11 rounded-xl bg-green-500/10 flex items-center justify-center group-hover:scale-110 transition"
      >
        <ion-icon name="checkmark-done-outline" class="text-xl text-green-400"></ion-icon>
      </div>

      <div class="flex flex-col">
        <span class="text-xs text-white/50">Completed</span>
        <span class="text-xl font-bold text-green-400">{{ stats.completed }}</span>
      </div>
    </div>

    <!-- FAVORITES -->
    <div
      class="relative group overflow-hidden rounded-2xl border border-white/10 bg-white/5 backdrop-blur-xl p-4 flex items-center gap-4 hover:bg-white/10 transition"
    >
      <div class="absolute left-0 top-0 h-full w-1 bg-red-500"></div>

      <div
        class="w-11 h-11 rounded-xl bg-red-500/10 flex items-center justify-center group-hover:scale-110 transition"
      >
        <ion-icon name="heart-outline" class="text-xl text-red-400"></ion-icon>
      </div>

      <div class="flex flex-col">
        <span class="text-xs text-white/50">Favorites</span>
        <span class="text-xl font-bold text-red-400">{{ stats.favorites }}</span>
      </div>
    </div>

    <!-- FOCUS -->
    <div
      class="relative group overflow-hidden rounded-2xl border border-white/10 bg-white/5 backdrop-blur-xl p-4 flex items-center gap-4 hover:bg-white/10 transition"
    >
      <div class="absolute left-0 top-0 h-full w-1 bg-cyan-500"></div>

      <div
        class="w-11 h-11 rounded-xl bg-cyan-500/10 flex items-center justify-center group-hover:scale-110 transition"
      >
        <ion-icon name="flash-outline" class="text-xl text-cyan-400"></ion-icon>
      </div>

      <div class="flex flex-col w-full">
        <div class="flex justify-between items-center">
          <span class="text-xs text-white/50">Focus</span>
          <span class="text-sm text-cyan-400 font-semibold">
            {{ (stats.active / (stats.total || 1)) * 100 | number: '1.0-0' }}%
          </span>
        </div>

        <!-- mini progress bar -->
        <div class="mt-2 h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
          <div
            class="h-full bg-cyan-400 rounded-full transition-all"
            [style.width.%]="(stats.active / (stats.total || 1)) * 100"
          ></div>
        </div>
      </div>
    </div>
  </div>
</ng-container>
