<ion-card>
  <ion-card-header>
    <ion-card-title>{{ note.title }}</ion-card-title>
  </ion-card-header>

  <ion-card-content>
    <p>{{ note.content }}</p>

    <ion-button (click)="favorite.emit(note.id)"> ⭐ </ion-button>

    <ion-button color="danger" (click)="delete.emit(note.id)"> Delete </ion-button>
  </ion-card-content>
</ion-card>
