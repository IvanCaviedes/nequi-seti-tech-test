<div class="flex flex-col gap-4 p-4">
  <!-- HEADER -->
  <div>
    <h1 class="text-xl font-semibold">My Notes</h1>
    <p class="text-sm text-gray-500">Organize your ideas</p>
  </div>

  <app-note-editor *ngIf="true" />

  <!-- SEARCH -->
  <app-search-bar [value]="search" placeholder="Search notes..." />

  <!-- LIST -->
  <app-note-list [notes]="(notes$ | async) || []" [loading]="loading" />
</div>
