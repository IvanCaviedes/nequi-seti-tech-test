<app-ui-card class="cursor-pointer hover:scale-[1.01] transition-all">
  <!-- HEADER -->
  <div class="flex justify-between items-start gap-2">
    <div (click)="open.emit(note.id)" class="flex-1">
      <h3 class="font-semibold text-gray-900 dark:text-white">
        {{ note.title }}
      </h3>

      <p class="text-sm text-gray-500 line-clamp-2">
        {{ note.content }}
      </p>
    </div>

    <!-- ACTIONS -->
    <div class="flex gap-1">
      <!-- FAVORITE -->
      <app-ui-button variant="ghost" size="sm" (click)="favorite.emit(note.id)">
        <span [class.text-yellow-400]="note.isFavorite"> ★ </span>
      </app-ui-button>

      <!-- DELETE -->
      <app-ui-button variant="ghost" size="sm" (click)="delete.emit(note.id)"> 🗑 </app-ui-button>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="flex justify-between items-center mt-3">
    <!-- CATEGORY -->
    <!-- <app-ui-badge *ngIf="note.category" variant="secondary">
      {{ note.category }}
    </app-ui-badge> -->

    <!-- DATE -->
    <span class="text-xs text-gray-400">
      {{ note.createdAt | date: 'short' }}
    </span>
  </div>
</app-ui-card>
