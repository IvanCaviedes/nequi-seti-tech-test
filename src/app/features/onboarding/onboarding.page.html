<div
  class="relative min-h-screen w-full overflow-hidden text-white flex items-center justify-center p-4"
>
  <!-- 🌈 BACKGROUND (igual para ambos) -->
  <div class="absolute inset-0">
    <div
      class="absolute w-[500px] h-[500px] bg-purple-600 blur-[140px] opacity-40 top-[-120px] left-[-120px]"
    ></div>
    <div
      class="absolute w-[500px] h-[500px] bg-blue-500 blur-[140px] opacity-30 bottom-[-150px] right-[-150px]"
    ></div>
  </div>

  <!-- CARD CONTAINER (WEB SAFE) -->
  <div class="relative z-10 w-full max-w-md">
    <div
      class="backdrop-blur-xl bg-white/10 border border-white/20 rounded-3xl shadow-2xl px-6 py-10 flex flex-col justify-between h-[600px]"
    >
      <!-- SKIP -->
      <div class="flex justify-end">
        <button class="text-xs text-white/50 hover:text-white transition" (click)="finish()">
          Skip
        </button>
      </div>

      <!-- CONTENT -->
      <div class="flex-1 flex flex-col items-center justify-center text-center">
        <!-- ICON -->
        <div
          class="w-24 h-24 rounded-3xl flex items-center justify-center text-4xl backdrop-blur-xl bg-white/10 border border-white/20 shadow-lg transition-all duration-300"
          [ngClass]="slides[step].color"
        >
          {{ slides[step].emoji }}
        </div>

        <!-- TITLE -->
        <h2 class="text-xl md:text-2xl font-bold mt-6">{{ slides[step].title }}</h2>

        <!-- DESC -->
        <p class="text-sm text-white/60 mt-3 max-w-xs">{{ slides[step].desc }}</p>
      </div>

      <!-- DOTS -->
      <div class="flex justify-center gap-2 mb-6">
        <span
          *ngFor="let s of slides; let i = index"
          class="h-2 rounded-full transition-all duration-300"
          [ngClass]="i === step ? 'bg-white w-6' : 'bg-white/30 w-2'"
        ></span>
      </div>

      <!-- ACTIONS -->
      <div class="flex gap-3">
        <button
          class="flex-1 py-3 rounded-xl bg-white/10 border border-white/10 hover:bg-white/20 transition"
          (click)="prev()"
          [disabled]="step === 0"
        >
          Back
        </button>

        <button
          class="flex-1 py-3 rounded-xl font-semibold text-black bg-white hover:scale-[1.02] transition"
          (click)="step === slides.length - 1 ? finish() : next()"
        >
          {{ step === slides.length - 1 ? 'Get Started' : 'Next' }}
        </button>
      </div>
    </div>
  </div>
</div>
