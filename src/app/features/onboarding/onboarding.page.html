<div class="relative z-10 w-full max-w-md">
  <div class="absolute top-4 left-4 z-20">
    <!-- NORMAL STATE -->
    <ng-container *ngIf="step < slides.length - 1; else redirectState">
      <div class="relative w-10 h-10">
        <svg class="w-10 h-10 -rotate-90" viewBox="0 0 40 40">
          <!-- BACK -->
          <circle
            cx="20"
            cy="20"
            r="16"
            stroke="rgba(255,255,255,0.15)"
            stroke-width="3"
            fill="none"
          />

          <!-- PROGRESS -->
          <circle
            cx="20"
            cy="20"
            r="16"
            stroke="white"
            stroke-width="3"
            fill="none"
            stroke-linecap="round"
            [attr.stroke-dasharray]="100.53"
            [attr.stroke-dashoffset]="100.53 - (100.53 * progress) / 100"
            style="transition: stroke-dashoffset 0.2s linear"
          />
        </svg>

        <!-- STEP -->
        <div class="absolute inset-0 flex items-center justify-center text-[9px] text-white/70">
          {{ step + 1 }}/{{ slides.length }}
        </div>
      </div>
    </ng-container>

    <!-- REDIRECT STATE (LAST SLIDE) -->
    <ng-template #redirectState>
      <div
        class="flex items-center gap-2 px-3 py-1 rounded-full bg-white/10 border border-white/10 backdrop-blur-md animate-pulse"
      >
        <!-- simple loader dot -->
        <span class="w-2 h-2 bg-white rounded-full"></span>

        <span class="text-[10px] text-white/70 whitespace-nowrap"> Redirecting to login </span>
      </div>
    </ng-template>
  </div>

  <div
    class="backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl shadow-2xl px-6 py-10 flex flex-col justify-between h-[600px]"
  >
    <!-- SKIP -->
    <div class="flex justify-end">
      <button class="text-xs text-white/50 hover:text-white transition" (click)="finish()">
        Skip
      </button>
    </div>

    <!-- CONTENT -->
    <div class="flex-1 flex flex-col items-center justify-center text-center">
      <!-- ICON -->
      <div
        class="w-24 h-24 rounded-3xl flex items-center justify-center text-4xl backdrop-blur-xl bg-white/10 border border-white/20 shadow-lg transition-all duration-300"
        [ngClass]="slides[step].color"
      >
        {{ slides[step].emoji }}
      </div>

      <!-- TITLE -->
      <h2 class="text-xl md:text-2xl font-bold mt-6">{{ slides[step].title }}</h2>

      <!-- DESC -->
      <p class="text-sm text-white/60 mt-3 max-w-xs">{{ slides[step].desc }}</p>
    </div>

    <!-- DOTS -->
    <div class="flex justify-center gap-2 mb-6">
      <span
        *ngFor="let s of slides; let i = index"
        class="h-2 rounded-full transition-all duration-300"
        [ngClass]="i === step ? 'bg-white w-6' : 'bg-white/30 w-2'"
      ></span>
    </div>

    <!-- ACTIONS -->
    <div class="flex gap-3">
      <button
        class="flex-1 py-3 rounded-xl bg-white/10 border border-white/10 hover:bg-white/20 transition"
        (click)="prev()"
        [disabled]="step === 0"
      >
        Back
      </button>

      <button
        class="flex-1 py-3 rounded-xl font-semibold text-black bg-white hover:scale-[1.02] transition"
        (click)="step === slides.length - 1 ? finish() : next()"
      >
        {{ step === slides.length - 1 ? 'Get Started' : 'Next' }}
      </button>
    </div>
  </div>
</div>
