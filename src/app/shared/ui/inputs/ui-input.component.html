<div class="w-full">
  <input
    [type]="type"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [value]="value"
    (input)="onInput($event)"
    class="w-full rounded-xl transition-all outline-none"
    [ngClass]="[
      size === 'sm' ? 'px-3 py-1 text-sm' : '',
      size === 'md' ? 'px-4 py-2 text-base' : '',
      size === 'lg' ? 'px-5 py-3 text-lg' : '',
      variant === 'default'
        ? 'bg-white dark:bg-surface-dark shadow-soft border border-transparent'
        : '',

      variant === 'outlined' ? 'bg-transparent border border-gray-300 dark:border-gray-600' : '',

      variant === 'ghost' ? 'bg-transparent border-none' : '',

      disabled ? 'opacity-50 cursor-not-allowed' : '',
      error ? 'border-red-500 focus:ring-red-500' : 'focus:ring-2 focus:ring-brand-500',
    ]"
  />
</div>
